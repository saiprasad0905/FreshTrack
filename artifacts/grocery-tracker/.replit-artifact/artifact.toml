kind = "web"
previewPath = "/"
title = "Smart Grocery & Expiry Tracker"
version = "1.0.0"
id = "artifacts/grocery-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24087

[services.development]
run = "pnpm --filter @workspace/grocery-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grocery-tracker", "run", "build" ]
publicDir = "artifacts/grocery-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24087"
BASE_PATH = "/"
